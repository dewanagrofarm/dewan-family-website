<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Dewan Family</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>👨‍👩‍👧‍👦 Join Dewan Family</h1>

  <form id="registerForm">

    <label>পূর্ণ নাম</label><br>
    <input type="text" id="name" placeholder="আপনার নাম"><br><br>

    <label>মোবাইল নম্বর</label><br>
    <input type="text" id="mobile" placeholder="01XXXXXXXXX"><br><br>

    <label>ইমেইল</label><br>
    <input type="email" id="email" placeholder="example@gmail.com"><br><br>

    <label>পাসওয়ার্ড</label><br>
    <input type="password" id="password" placeholder="********"><br><br>

    <button type="submit">✅ নিবন্ধন করুন</button>

  </form>

</div>

</body>
</html>
