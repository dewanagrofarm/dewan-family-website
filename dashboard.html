<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4fff7;
}

header{
    background:#0b5d3b;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}

a{
    display:inline-block;
    background:#0b5d3b;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
}
</style>

</head>
<body>

<header>
<h1>🔐 Admin Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h2>স্বাগতম Admin</h2>
<p>এখান থেকে ভবিষ্যতে Family Member, Gallery, History, Agro Farm ইত্যাদি নিয়ন্ত্রণ করা যাবে।</p>
</div>
<input type="text" id="name" placeholder="নাম">
<br><br>

<textarea id="details" placeholder="বিস্তারিত"></textarea>
<br><br>

<button onclick="saveData()">Save</button>
<a href="index.html">🏠 Home</a>

</div>
<script type="module" src="admin.js"></script>
</body>
</html>
